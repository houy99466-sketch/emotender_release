<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EmoTender · 情绪酒保</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New','PingFang SC',monospace;
    background: #050508;
    overflow: hidden;
  }

  /* ===== CRT FACE ===== */
  #crt-screen {
    position:relative; width:400px; height:400px;
    background-color:#000000 !important;
    overflow:hidden;
    border-radius: 12px;
  }
  #crt-screen[data-emotion="清醒"] { --neon-color:#00f2fe; }
  #crt-screen[data-emotion="兴奋"] { --neon-color:#00ff66; }
  #crt-screen[data-emotion="难过"] { --neon-color:#d8b4fe; }
  #crt-screen[data-emotion="疲惫"] { --neon-color:#ffd166; }
  #crt-screen[data-emotion="焦虑"] { --neon-color:#ff4d4d; }
  #crt-screen[data-emotion="犹豫"] { --neon-color:#39FF14; }

  .neon-path {
    fill:none; stroke:var(--neon-color) !important;
    stroke-width:12; stroke-linecap:round; stroke-linejoin:round;
  }
  .neon-fill {
    fill:var(--neon-color) !important;
  }
  .neon-path-thin {
    fill:none; stroke:var(--neon-color) !important;
    stroke-width:5; stroke-linecap:round; stroke-linejoin:round;
  }
  .neon-fill-dot {
    fill:var(--neon-color) !important;
  }
  .neon-hollow {
    fill:none; stroke:var(--neon-color) !important;
    stroke-width:5; stroke-linecap:round; stroke-linejoin:round;
  }

  #face-state-label {
    position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%);
    z-index: 20; font-family: 'Courier New', monospace; font-size: 11px;
    letter-spacing: 0.2em; color: var(--neon-color); opacity: 0.45;
    text-transform: uppercase; transition: color 0.3s ease; pointer-events: none;
  }

  .pixel-face-group {
    opacity:0 !important; visibility:hidden !important;
    transform:scale(0.85); transform-origin:200px 200px;
    transition:opacity 0.3s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  #crt-screen[data-emotion="清醒"] #group-qx,
  #crt-screen:not([data-emotion]) #group-qx,
  #crt-screen[data-emotion=""] #group-qx,
  #crt-screen[data-emotion="兴奋"] #group-xf,
  #crt-screen[data-emotion="难过"] #group-ng,
  #crt-screen[data-emotion="疲惫"] #group-pb,
  #crt-screen[data-emotion="焦虑"] #group-jl,
  #crt-screen[data-emotion="犹豫"] #group-yy {
    opacity:1 !important; visibility:visible !important; transform:scale(1) !important;
  }

  /* ================================================================
     动态动画系统（时长 1.4-1.7s，舒缓柔和，眼间距恒定）
     ================================================================ */

  /* --- 清醒·平淡无感：呼吸光效 1.5s --- */
  @keyframes qx-breathe {
    0%, 100% { opacity: 0.70; }
    50%      { opacity: 1.0; }
  }
  .qx-eye-l, .qx-eye-r, #group-qx .neon-path-thin {
    animation: qx-breathe 1.5s ease-in-out infinite;
  }

  /* --- 兴奋·开怀大笑 1.5s --- */
  /* 双眼月牙弧度先抬升再回落 */
  @keyframes xf-eyes-lift {
    0%, 100% { transform: scaleY(1); }
    30%, 70%  { transform: scaleY(1.14); }
  }
  .xf-eye-l { animation: xf-eyes-lift 1.5s ease-in-out infinite; transform-origin: 117px 136px; }
  .xf-eye-r { animation: xf-eyes-lift 1.5s ease-in-out infinite; transform-origin: 283px 136px; }

  /* 嘴巴横向舒展张开再收回 */
  @keyframes xf-mouth-stretch {
    0%, 100% { transform: scaleX(1); }
    35%, 65%  { transform: scaleX(1.07); }
  }
  .xf-mouth { animation: xf-mouth-stretch 1.5s ease-in-out infinite; transform-origin: 200px 236px; }

  /* 双眼亮度随笑容同步提亮 */
  @keyframes xf-glow {
    0%, 100% { opacity: 0.85; }
    30%, 70%  { opacity: 1.0; }
  }
  .xf-eye-l, .xf-eye-r { animation: xf-eyes-lift 1.5s ease-in-out infinite, xf-glow 1.5s ease-in-out infinite; }
  .xf-eye-l { transform-origin: 117px 136px; }
  .xf-eye-r { transform-origin: 283px 136px; }

  /* --- 难过·委屈疑惑：呼吸光效 1.7s（最舒缓） --- */
  @keyframes ng-breathe {
    0%, 100% { opacity: 0.65; }
    50%      { opacity: 1.0; }
  }
  .ng-eye-l, .ng-eye-r, .ng-mouth {
    animation: ng-breathe 1.7s ease-in-out infinite;
  }

  /* --- 疲惫·慵懒犯困 1.5s --- */
  /* 眼皮缓慢向下闭合，弧度加大 */
  @keyframes pb-eyes-droop {
    0%, 100% { transform: scaleY(1); }
    45%, 80%  { transform: scaleY(1.16); }
  }
  .pb-eye-l { animation: pb-eyes-droop 1.5s ease-in-out infinite; transform-origin: 117px 138px; }
  .pb-eye-r { animation: pb-eyes-droop 1.5s ease-in-out infinite; transform-origin: 283px 138px; }

  /* 嘴巴轻微向下抿动 */
  @keyframes pb-mouth-purse {
    0%, 100% { transform: translateY(0); }
    45%, 80%  { transform: translateY(3px); }
  }
  .pb-mouth { animation: pb-mouth-purse 1.5s ease-in-out infinite; }

  /* --- 焦虑·烦躁愠怒 1.4s --- */
  /* 双眼V形向内小幅聚拢（左眼右移，右眼左移） */
  @keyframes jl-eye-l-in {
    0%, 100% { transform: translateX(0); }
    35%, 60%  { transform: translateX(4px); }
  }
  @keyframes jl-eye-r-in {
    0%, 100% { transform: translateX(0); }
    35%, 60%  { transform: translateX(-4px); }
  }
  .jl-eye-l-group { animation: jl-eye-l-in 1.4s ease-in-out infinite; }
  .jl-eye-r-group { animation: jl-eye-r-in 1.4s ease-in-out infinite; }

  /* 嘴巴波浪纹路上下轻柔颤动2次 */
  @keyframes jl-mouth-tremble {
    0%        { transform: translateY(0); }
    12%, 20%  { transform: translateY(-2px); }
    28%, 36%  { transform: translateY(2px); }
    44%, 52%  { transform: translateY(-1.5px); }
    60%, 68%  { transform: translateY(1.5px); }
    100%      { transform: translateY(0); }
  }
  .jl-mouth { animation: jl-mouth-tremble 1.4s ease-in-out infinite; }

  /* --- 犹豫·眩晕难受 1.6s --- */
  /* X形双眼轻微顺时针缓慢小幅度旋转 */
  @keyframes yy-eyes-rotate {
    0%, 100% { transform: rotate(0deg); }
    35%, 70%  { transform: rotate(5deg); }
  }
  .yy-eye-l-group { animation: yy-eyes-rotate 1.6s ease-in-out infinite; transform-origin: 117px 136px; }
  .yy-eye-r-group { animation: yy-eyes-rotate 1.6s ease-in-out infinite; transform-origin: 283px 136px; }

  /* 撇嘴嘴巴小幅左右微动 */
  @keyframes yy-mouth-sway {
    0%, 100% { transform: translateX(0); }
    25%, 50%  { transform: translateX(3px); }
    62%, 88%  { transform: translateX(-3px); }
  }
  .yy-mouth { animation: yy-mouth-sway 1.6s ease-in-out infinite; }

  /* ================================================================
     响应式
     ================================================================ */
  @media (max-width: 600px) {
    #crt-screen { width:320px; height:320px; }
    #face-state-label { font-size:9px; bottom:-24px; }
  }
  @media (max-width: 400px) {
    #crt-screen { width:280px; height:280px; }
    #face-state-label { font-size:8px; bottom:-22px; }
  }
</style>
</head>
<body>

<div id="crt-screen" data-emotion="清醒" style="position: relative; width: 400px; height: 400px; background-color: #000000 !important; overflow: hidden;">
  <svg viewBox="0 0 400 400" style="width: 100%; height: 100%;">
    <!-- 柔光弥散滤镜 -->
    <defs>
      <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur1"/>
        <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur2"/>
        <feMerge>
          <feMergeNode in="blur2"/>
          <feMergeNode in="blur1"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>

    <rect x="0" y="0" width="400" height="400" fill="#000000"/>

    <!--
      固定点位参数:
      双眼总跨度 62% = 248px, 起点 x=76, 终点 x=324
      单眼宽度 w = 82.7, 左眼 cx≈117, 右眼 cx≈283
      眼中心 Y = 34% × 400 = 136
      嘴中心 X = 200, Y = 136 + 1.2×83 ≈ 236
      动画仅做形态缩放/开合/微移，双眼横向间距全程固定
    -->

    <!-- 1. 清醒 → 平淡无感：水平直线眼 + 极短细线嘴 · 呼吸光效 -->
    <g id="group-qx" class="pixel-face-group" filter="url(#soft-glow)">
      <line class="neon-path qx-eye-l" x1="76" y1="136" x2="159" y2="136"/>
      <line class="neon-path qx-eye-r" x1="241" y1="136" x2="324" y2="136"/>
      <line class="neon-path-thin" x1="190" y1="236" x2="210" y2="236"/>
    </g>

    <!-- 2. 兴奋 → 开怀笑：上弯月牙眼 + 宽U大笑嘴 · 眼弧抬升+嘴横向舒展 -->
    <g id="group-xf" class="pixel-face-group" filter="url(#soft-glow)">
      <path class="neon-path xf-eye-l" d="M76,136 Q117,96 159,136"/>
      <path class="neon-path xf-eye-r" d="M241,136 Q283,96 324,136"/>
      <path class="neon-path xf-mouth" d="M138,236 Q200,290 262,236"/>
    </g>

    <!-- 3. 难过 → 委屈疑惑：空心圆圈眼 + 波浪嘴 · 呼吸光效 -->
    <g id="group-ng" class="pixel-face-group" filter="url(#soft-glow)">
      <circle class="neon-hollow ng-eye-l" cx="117" cy="136" r="34"/>
      <circle class="neon-hollow ng-eye-r" cx="283" cy="136" r="34"/>
      <path class="neon-path ng-mouth" d="M168,236 Q184,226 200,236 Q216,246 232,236"/>
    </g>

    <!-- 4. 疲惫 → 慵懒犯困：下弯月牙眼 + 短下凹嘴 · 眼皮下垂+嘴抿动 -->
    <g id="group-pb" class="pixel-face-group" filter="url(#soft-glow)">
      <path class="neon-path pb-eye-l" d="M76,128 Q117,148 159,128"/>
      <path class="neon-path pb-eye-r" d="M241,128 Q283,148 324,128"/>
      <path class="neon-path pb-mouth" d="M182,242 Q200,254 218,242"/>
    </g>

    <!-- 5. 焦虑 → 烦躁愠怒：V形内斜眼 + 三段波浪嘴 · 双眼聚拢+嘴颤动2次 -->
    <g id="group-jl" class="pixel-face-group" filter="url(#soft-glow)">
      <g class="jl-eye-l-group">
        <path class="neon-path jl-eye-l" d="M88,118 L117,142 L146,118"/>
      </g>
      <g class="jl-eye-r-group">
        <path class="neon-path jl-eye-r" d="M254,118 L283,142 L312,118"/>
      </g>
      <path class="neon-path jl-mouth" d="M175,236 Q184,228 192,236 Q200,244 208,236 Q216,228 225,236"/>
    </g>

    <!-- 6. 犹豫 → 眩晕难受：X叉号眼 + 下挤压凸嘴 · 双眼旋转+嘴左右微动 -->
    <g id="group-yy" class="pixel-face-group" filter="url(#soft-glow)">
      <g class="yy-eye-l-group">
        <line class="neon-path-thin" x1="92" y1="116" x2="142" y2="156"/>
        <line class="neon-path-thin" x1="142" y1="116" x2="92" y2="156"/>
      </g>
      <g class="yy-eye-r-group">
        <line class="neon-path-thin" x1="258" y1="116" x2="308" y2="156"/>
        <line class="neon-path-thin" x1="308" y1="116" x2="258" y2="156"/>
      </g>
      <path class="neon-path yy-mouth" d="M175,240 Q190,234 200,229 Q210,234 225,240"/>
    </g>
  </svg>

  <div id="face-state-label">清醒</div>
</div>

<script>
// ===== STATE =====
let currentFaceState="standby";

function setFaceState(state){
  currentFaceState=state;
  var sl=document.getElementById("face-state-label");
  if(sl)sl.textContent=(state||'').toUpperCase();
}

// ===== CORE: updateTenderState (原封不动保留) =====
window.updateTenderState = function(jsonData) {
    console.log("[EmoTender Platform] 收到状态载荷:", jsonData);
    const screen = document.getElementById('crt-screen');
    if (!screen) {
        console.error("【致命配置断联】未能在页面找到 id='crt-screen' 的面部 DOM 节点！");
        return;
    }
    let finalEmotion = "清醒";
    const label = (jsonData.emotion_label || "").trim();
    const state = (jsonData.face_state || "").trim();
    if (label === "疲惫" || (state === "gentle" && label !== "难过")) { finalEmotion = "疲惫"; }
    else if (label === "难过") { finalEmotion = "难过"; }
    else if (label === "焦虑" || (state === "focused" && label !== "清醒")) { finalEmotion = "焦虑"; }
    else if (label === "清醒") { finalEmotion = "清醒"; }
    else if (label === "兴奋" || state === "happy") { finalEmotion = "兴奋"; }
    else if (label === "犹豫" || state === "thinking") { finalEmotion = "犹豫"; }
    screen.setAttribute('data-emotion', finalEmotion);
    console.log("[EmoTender UI] 状态成功直连重组，亮起情绪: " + finalEmotion);
    if (jsonData.face_state) setFaceState(jsonData.face_state);
};

// ===== INIT =====
function init(){
  var screen=document.getElementById("crt-screen");
  if(screen){screen.setAttribute("data-emotion","清醒");}
  setFaceState("清醒");
}

// ===== MOCK KEYBOARD: 数字键 1-6 注入伪造载荷 =====
const MOCK_PAYLOADS = {
  "1": {
    schema_version: "1.0", turn_type: "recommendation",
    user_text: "[MOCK] 清醒测试", emotion_label: "清醒",
    emotion_blend: [{ emotion: "清醒", weight: 1.0 }],
    complex_emotion: "精神集中，状态在线。",
    need_summary: "需要一杯清爽低甜的饮品保持清醒。",
    drink_name: "冷启动",
    recipe_modules: ["clear_balance", "bitter_focus", "spark_restart"],
    flavor_profile: "微苦清爽",
    color_profile: "透明偏冷调，带一点淡青色",
    face_state: "focused",
    bartender_line: "（本地测试）系统高能自检中，请下达指令。",
    action_sequence: "make_cold_start",
    feedback_prompt: "感觉怎么样？还需要调整吗？"
  },
  "2": {
    schema_version: "1.0", turn_type: "recommendation",
    user_text: "[MOCK] 兴奋测试", emotion_label: "兴奋",
    emotion_blend: [{ emotion: "兴奋", weight: 1.0 }],
    complex_emotion: "情绪高涨，充满活力。",
    need_summary: "需要一杯充满气泡感的庆祝饮品。",
    drink_name: "气泡重启",
    recipe_modules: ["bright_bubble", "spark_restart"],
    flavor_profile: "酸甜气泡",
    color_profile: "明亮霓虹绿",
    face_state: "happy",
    bartender_line: "（本地测试）今天真是太棒了！来杯气泡轰炸吧！",
    action_sequence: "make_spark_restart",
    feedback_prompt: "好喝吗？还想再来点别的吗？"
  },
  "3": {
    schema_version: "1.0", turn_type: "recommendation",
    user_text: "[MOCK] 难过测试", emotion_label: "难过",
    emotion_blend: [{ emotion: "难过", weight: 1.0 }],
    complex_emotion: "情绪低落，需要安抚。",
    need_summary: "需要一杯柔和、低刺激、温暖的饮品。",
    drink_name: "软着陆",
    recipe_modules: ["soft_comfort", "blue_calm"],
    flavor_profile: "低酸柔和",
    color_profile: "浅蓝紫色",
    face_state: "gentle",
    bartender_line: "（本地测试）没关系的，慢慢来，先喝杯热的吧。",
    action_sequence: "make_soft_comfort",
    feedback_prompt: "有没有感觉好一点点？"
  },
  "4": {
    schema_version: "1.0", turn_type: "bar_chat",
    user_text: "[MOCK] 疲惫测试", emotion_label: "疲惫",
    emotion_blend: [{ emotion: "疲惫", weight: 1.0 }],
    complex_emotion: "身心俱疲，精力见底。",
    need_summary: "需要被接住，不急着推荐。",
    drink_name: "无正式推荐",
    recipe_modules: [],
    flavor_profile: "无正式推荐",
    color_profile: "无正式推荐",
    face_state: "gentle",
    bartender_line: "（本地测试）哈啊……能量有点低，我想静静。",
    action_sequence: "gesture_thinking",
    feedback_prompt: "你愿意的话，可以再说一点。"
  },
  "5": {
    schema_version: "1.0", turn_type: "bar_chat",
    user_text: "[MOCK] 焦虑测试", emotion_label: "焦虑",
    emotion_blend: [{ emotion: "焦虑", weight: 1.0 }],
    complex_emotion: "心神不宁，心跳加快。",
    need_summary: "需要稳定节奏，不推荐酒精。",
    drink_name: "无正式推荐",
    recipe_modules: [],
    flavor_profile: "无正式推荐",
    color_profile: "无正式推荐",
    face_state: "focused",
    bartender_line: "（本地测试）心跳好快……节奏乱了，快让我稳定下来。",
    action_sequence: "serve_only",
    feedback_prompt: "深呼吸，我在这里。"
  },
  "6": {
    schema_version: "1.0", turn_type: "bar_chat",
    user_text: "[MOCK] 犹豫测试", emotion_label: "犹豫",
    emotion_blend: [{ emotion: "犹豫", weight: 1.0 }],
    complex_emotion: "选择困难，左右摇摆。",
    need_summary: "需要更多时间考虑，不急着决定。",
    drink_name: "无正式推荐",
    recipe_modules: [],
    flavor_profile: "无正式推荐",
    color_profile: "无正式推荐",
    face_state: "thinking",
    bartender_line: "（本地测试）唔……这个听起来不错，那个好像也可以？",
    action_sequence: "gesture_thinking",
    feedback_prompt: "不着急，慢慢想。"
  }
};

document.addEventListener("keydown", function(e) {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  var key = e.key;
  if (MOCK_PAYLOADS[key]) {
    e.preventDefault();
    var payload = MOCK_PAYLOADS[key];
    console.log("[EmoTender MOCK] 按键 " + key + " -> 注入伪造载荷: " + payload.emotion_label);
    window.updateTenderState(payload);
  }
});

document.addEventListener("DOMContentLoaded",init);
</script>
</body>
</html>
