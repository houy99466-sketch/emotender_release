<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EmoTender · 情绪酒保</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; gap: 24px;
    font-family: 'Courier New','PingFang SC',monospace;
    background: #050508;
    overflow-x: hidden;
  }

  /* ===== CRT FACE ===== */
  #crt-screen {
    position:relative; width:400px; height:400px;
    background-color:#000000 !important;
    overflow:hidden; border-radius:12px;
    transition: box-shadow 0.4s ease;
  }
  #crt-screen[data-emotion="清醒"] { --neon-color:#00f2fe; }
  #crt-screen[data-emotion="兴奋"] { --neon-color:#00ff66; }
  #crt-screen[data-emotion="难过"] { --neon-color:#d8b4fe; }
  #crt-screen[data-emotion="疲惫"] { --neon-color:#ffd166; }
  #crt-screen[data-emotion="焦虑"] { --neon-color:#ff4d4d; }
  #crt-screen[data-emotion="犹豫"] { --neon-color:#39FF14; }

  @keyframes recording-pulse {
    0%, 100% { box-shadow: 0 0 0 0px transparent; }
    50%      { box-shadow: 0 0 30px 3px var(--neon-color, #00f2fe); }
  }
  #crt-screen.recording-active {
    animation: recording-pulse 1.2s ease-in-out infinite;
    box-shadow: 0 0 20px 2px var(--neon-color, #00f2fe);
  }

  .neon-path {
    fill:none; stroke:var(--neon-color) !important;
    stroke-width:12; stroke-linecap:round; stroke-linejoin:round;
  }
  .neon-path-thin {
    fill:none; stroke:var(--neon-color) !important;
    stroke-width:5; stroke-linecap:round; stroke-linejoin:round;
  }
  .neon-hollow {
    fill:none; stroke:var(--neon-color) !important;
    stroke-width:5; stroke-linecap:round; stroke-linejoin:round;
  }

  #face-state-label {
    position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%);
    z-index: 20; font-family: 'Courier New', monospace; font-size: 11px;
    letter-spacing: 0.2em; color: var(--neon-color); opacity: 0.45;
    text-transform: uppercase; transition: color 0.3s ease; pointer-events: none;
  }

  .pixel-face-group {
    opacity:0 !important; visibility:hidden !important;
    transform:scale(0.85); transform-origin:200px 200px;
    transition:opacity 0.5s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  #crt-screen[data-emotion="清醒"] #group-qx,
  #crt-screen:not([data-emotion]) #group-qx,
  #crt-screen[data-emotion=""] #group-qx,
  #crt-screen[data-emotion="兴奋"] #group-xf,
  #crt-screen[data-emotion="难过"] #group-ng,
  #crt-screen[data-emotion="疲惫"] #group-pb,
  #crt-screen[data-emotion="焦虑"] #group-jl,
  #crt-screen[data-emotion="犹豫"] #group-yy {
    opacity:1 !important; visibility:visible !important; transform:scale(1) !important;
  }

  /* ===== 分段式时序动画 ===== */
  @keyframes qx-breathe { 0%,100%{opacity:0.70} 50%{opacity:1.0} }
  .qx-eye-l, .qx-eye-r, #group-qx .neon-path-thin { animation:qx-breathe 1.5s ease-in-out infinite; }

  @keyframes xf-eyes-lift { 0%,100%{transform:scaleY(1)} 30%,70%{transform:scaleY(1.14)} }
  @keyframes xf-mouth-stretch { 0%,100%{transform:scaleX(1)} 35%,65%{transform:scaleX(1.07)} }
  @keyframes xf-glow { 0%,100%{opacity:0.85} 30%,70%{opacity:1.0} }
  .xf-eye-l { animation:xf-eyes-lift 1.5s ease-in-out infinite, xf-glow 1.5s ease-in-out infinite; transform-origin:117px 136px; }
  .xf-eye-r { animation:xf-eyes-lift 1.5s ease-in-out infinite, xf-glow 1.5s ease-in-out infinite; transform-origin:283px 136px; }
  .xf-mouth { animation:xf-mouth-stretch 1.5s ease-in-out infinite; transform-origin:200px 236px; }

  @keyframes ng-breathe { 0%,100%{opacity:0.65} 50%{opacity:1.0} }
  .ng-eye-l, .ng-eye-r, .ng-mouth { animation:ng-breathe 1.7s ease-in-out infinite; }

  @keyframes pb-eyes-droop { 0%,100%{transform:scaleY(1)} 45%,80%{transform:scaleY(1.16)} }
  @keyframes pb-mouth-purse { 0%,100%{transform:translateY(0)} 45%,80%{transform:translateY(3px)} }
  .pb-eye-l { animation:pb-eyes-droop 1.5s ease-in-out infinite; transform-origin:117px 138px; }
  .pb-eye-r { animation:pb-eyes-droop 1.5s ease-in-out infinite; transform-origin:283px 138px; }
  .pb-mouth { animation:pb-mouth-purse 1.5s ease-in-out infinite; }

  @keyframes jl-eye-l-in { 0%,100%{transform:translateX(0)} 35%,60%{transform:translateX(4px)} }
  @keyframes jl-eye-r-in { 0%,100%{transform:translateX(0)} 35%,60%{transform:translateX(-4px)} }
  .jl-eye-l-group { animation:jl-eye-l-in 1.4s ease-in-out infinite; }
  .jl-eye-r-group { animation:jl-eye-r-in 1.4s ease-in-out infinite; }
  @keyframes jl-mouth-tremble {
    0%{transform:translateY(0)} 12%,20%{transform:translateY(-2px)} 28%,36%{transform:translateY(2px)}
    44%,52%{transform:translateY(-1.5px)} 60%,68%{transform:translateY(1.5px)} 100%{transform:translateY(0)}
  }
  .jl-mouth { animation:jl-mouth-tremble 1.4s ease-in-out infinite; }

  @keyframes yy-eyes-rotate { 0%,100%{transform:rotate(0deg)} 35%,70%{transform:rotate(5deg)} }
  .yy-eye-l-group { animation:yy-eyes-rotate 1.6s ease-in-out infinite; transform-origin:117px 136px; }
  .yy-eye-r-group { animation:yy-eyes-rotate 1.6s ease-in-out infinite; transform-origin:283px 136px; }
  @keyframes yy-mouth-sway { 0%,100%{transform:translateX(0)} 25%,50%{transform:translateX(3px)} 62%,88%{transform:translateX(-3px)} }
  .yy-mouth { animation:yy-mouth-sway 1.6s ease-in-out infinite; }

  /* ===== 控制栏 ===== */
  #control-bar {
    display: flex; align-items: center; gap: 16px;
  }
  #control-bar button {
    font-family: 'Courier New', monospace; font-size: 13px;
    padding: 8px 18px; border: 1px solid; cursor: pointer;
    background: transparent; transition: all 0.2s ease;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  #btnStart {
    color: #00f2fe; border-color: rgba(0,242,254,0.3);
  }
  #btnStart:hover { background: rgba(0,242,254,0.1); border-color: rgba(0,242,254,0.6); }
  #btnStop {
    color: #ff4d4d; border-color: rgba(255,77,77,0.2);
  }
  #btnStop:hover { background: rgba(255,77,77,0.1); border-color: rgba(255,77,77,0.4); }
  #btnReset {
    color: rgba(180,180,190,0.5); border-color: rgba(180,180,190,0.15);
  }
  #btnReset:hover { color: rgba(200,200,210,0.8); border-color: rgba(200,200,210,0.3); }

  #status-line {
    font-family: 'Courier New', monospace; font-size: 11px;
    color: rgba(0,242,254,0.35); letter-spacing: 0.15em;
    min-height: 1.2em; text-align: center;
  }

  /* ===== 回复文字 ===== */
  #reply-area {
    max-width: 420px; text-align: center;
    font-family: 'Courier New', monospace; font-size: 14px;
    color: rgba(0,242,254,0.7); line-height: 1.7;
    min-height: 2.5em; transition: opacity 0.4s ease;
  }

  @media (max-width: 500px) {
    #crt-screen { width:300px !important; height:300px !important; }
    #reply-area { font-size: 12px; max-width: 320px; }
    #control-bar button { font-size: 11px; padding: 6px 14px; }
  }
</style>
</head>
<body>

<!-- ===== CRT FACE ===== -->
<div id="crt-screen" data-emotion="清醒" style="position: relative; width: 400px; height: 400px; background-color: #000000 !important; overflow: hidden;">
  <svg viewBox="0 0 400 400" style="width: 100%; height: 100%;">
    <defs>
      <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur1"/>
        <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur2"/>
        <feMerge>
          <feMergeNode in="blur2"/>
          <feMergeNode in="blur1"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    <rect x="0" y="0" width="400" height="400" fill="#000000"/>

    <!-- 1. 清醒 → 平淡无感 -->
    <g id="group-qx" class="pixel-face-group" filter="url(#soft-glow)">
      <line class="neon-path qx-eye-l" x1="76" y1="136" x2="159" y2="136"/>
      <line class="neon-path qx-eye-r" x1="241" y1="136" x2="324" y2="136"/>
      <line class="neon-path-thin" x1="190" y1="236" x2="210" y2="236"/>
    </g>
    <!-- 2. 兴奋 → 开怀笑 -->
    <g id="group-xf" class="pixel-face-group" filter="url(#soft-glow)">
      <path class="neon-path xf-eye-l" d="M76,136 Q117,96 159,136"/>
      <path class="neon-path xf-eye-r" d="M241,136 Q283,96 324,136"/>
      <path class="neon-path xf-mouth" d="M138,236 Q200,290 262,236"/>
    </g>
    <!-- 3. 难过 → 眩晕难受（X眼+撇嘴） -->
    <g id="group-ng" class="pixel-face-group" filter="url(#soft-glow)">
      <g class="yy-eye-l-group">
        <line class="neon-path-thin" x1="92" y1="116" x2="142" y2="156"/>
        <line class="neon-path-thin" x1="142" y1="116" x2="92" y2="156"/>
      </g>
      <g class="yy-eye-r-group">
        <line class="neon-path-thin" x1="258" y1="116" x2="308" y2="156"/>
        <line class="neon-path-thin" x1="308" y1="116" x2="258" y2="156"/>
      </g>
      <path class="neon-path yy-mouth" d="M175,240 Q190,234 200,229 Q210,234 225,240"/>
    </g>
    <!-- 4. 疲惫 → 委屈疑惑（空心圈眼+波浪嘴） -->
    <g id="group-pb" class="pixel-face-group" filter="url(#soft-glow)">
      <circle class="neon-hollow ng-eye-l" cx="117" cy="136" r="34"/>
      <circle class="neon-hollow ng-eye-r" cx="283" cy="136" r="34"/>
      <path class="neon-path ng-mouth" d="M168,236 Q184,226 200,236 Q216,246 232,236"/>
    </g>
    <!-- 5. 焦虑 → 烦躁愠怒 -->
    <g id="group-jl" class="pixel-face-group" filter="url(#soft-glow)">
      <g class="jl-eye-l-group"><path class="neon-path jl-eye-l" d="M88,118 L117,142 L146,118"/></g>
      <g class="jl-eye-r-group"><path class="neon-path jl-eye-r" d="M254,118 L283,142 L312,118"/></g>
      <path class="neon-path jl-mouth" d="M175,236 Q184,228 192,236 Q200,244 208,236 Q216,228 225,236"/>
    </g>
    <!-- 6. 犹豫 → 慵懒犯困（下弯月牙+下凹嘴） -->
    <g id="group-yy" class="pixel-face-group" filter="url(#soft-glow)">
      <path class="neon-path pb-eye-l" d="M76,128 Q117,148 159,128"/>
      <path class="neon-path pb-eye-r" d="M241,128 Q283,148 324,128"/>
      <path class="neon-path pb-mouth" d="M182,242 Q200,254 218,242"/>
    </g>
  </svg>
  <div id="face-state-label">清醒</div>
</div>

<!-- ===== 酒保回复 ===== -->
<div id="reply-area"></div>

<!-- ===== 控制栏 ===== -->
<div id="control-bar">
  <button id="btnStart" onclick="startRecording()">Start</button>
  <button id="btnStop" onclick="stopRecording()">Stop</button>
  <span id="status-line"></span>
  <button id="btnReset" onclick="resetSystem()">Reset</button>
</div>

<script>
// ===== STATE =====
let currentFaceState = "standby";

function setFaceState(state) {
  currentFaceState = state;
  var sl = document.getElementById("face-state-label");
  if (sl) sl.textContent = (state || '').toUpperCase();
}

function setStatus(text) {
  var el = document.getElementById("status-line");
  if (el) el.textContent = text || '';
}

function setReply(text) {
  var el = document.getElementById("reply-area");
  if (el) {
    el.style.opacity = '0';
    setTimeout(function() {
      el.textContent = text || '';
      el.style.opacity = '1';
    }, 200);
  }
}

// ===== CORE: updateTenderState =====
window.updateTenderState = function(jsonData) {
    console.log("[EmoTender] 收到状态载荷:", jsonData);
    const screen = document.getElementById('crt-screen');
    if (!screen) return;

    let finalEmotion = "清醒";
    const label = (jsonData.emotion_label || "").trim();
    const state = (jsonData.face_state || "").trim();
    if (label === "疲惫" || (state === "gentle" && label !== "难过")) { finalEmotion = "疲惫"; }
    else if (label === "难过") { finalEmotion = "难过"; }
    else if (label === "焦虑" || (state === "focused" && label !== "清醒")) { finalEmotion = "焦虑"; }
    else if (label === "清醒") { finalEmotion = "清醒"; }
    else if (label === "兴奋" || state === "happy") { finalEmotion = "兴奋"; }
    else if (label === "犹豫" || state === "thinking") { finalEmotion = "犹豫"; }
    screen.setAttribute('data-emotion', finalEmotion);
    if (jsonData.face_state) setFaceState(jsonData.face_state);
};

// ===== API =====
const API_BASE = "";

async function callApi(path) {
  const resp = await fetch(API_BASE + path, { method: "POST" });
  const data = await resp.json();
  if (!resp.ok) throw data;
  return data;
}

async function startRecording() {
  try {
    setStatus("● RECORDING");
    var crt = document.getElementById("crt-screen");
    if (crt) crt.classList.add("recording-active");
    await callApi("/api/voice/start");
    console.log("[EmoTender] 录音已开始");
  } catch (err) {
    setStatus("IDLE");
    var crt = document.getElementById("crt-screen");
    if (crt) crt.classList.remove("recording-active");
    setReply("启动录音失败: " + (err.detail || err.message || "未知错误"));
  }
}

async function stopRecording() {
  try {
    setStatus("● PROCESSING");
    var crt = document.getElementById("crt-screen");
    if (crt) crt.classList.remove("recording-active");
    
    const data = await callApi("/api/voice/stop");
    console.log("[EmoTender] 分析结果:", data);
    
    if (data.control_json) {
      window.updateTenderState(data.control_json);
    }
    
    if (data.robot_reply_text) {
      setReply(data.robot_reply_text);
    }
    
    setStatus(data.turn_type === "bar_chat" ? "IDLE" : "● SERVED");
  } catch (err) {
    setStatus("IDLE");
    setReply("分析失败: " + (err.detail || err.message || "未知错误"));
  }
}

async function resetSystem() {
  try {
    await callApi("/api/reset");
    init();
    setReply("");
    console.log("[EmoTender] 已重置");
  } catch (err) {
    setReply("重置失败: " + (err.detail || err.message || "未知错误"));
  }
}

// ===== INIT =====
function init() {
  var screen = document.getElementById("crt-screen");
  if (screen) { screen.setAttribute("data-emotion", "清醒"); }
  setFaceState("清醒");
  setStatus("IDLE");
}

// ===== MOCK KEYBOARD 1-6 =====
const MOCK_PAYLOADS = {
  "1": { schema_version:"1.0",turn_type:"recommendation",user_text:"[MOCK] 清醒",emotion_label:"清醒",face_state:"focused",bartender_line:"系统自检中。",emotion_blend:[{emotion:"清醒",weight:1}],complex_emotion:"",need_summary:"",drink_name:"",recipe_modules:[],flavor_profile:"",color_profile:"",action_sequence:"",feedback_prompt:"" },
  "2": { schema_version:"1.0",turn_type:"recommendation",user_text:"[MOCK] 兴奋",emotion_label:"兴奋",face_state:"happy",bartender_line:"太棒了！",emotion_blend:[{emotion:"兴奋",weight:1}],complex_emotion:"",need_summary:"",drink_name:"",recipe_modules:[],flavor_profile:"",color_profile:"",action_sequence:"",feedback_prompt:"" },
  "3": { schema_version:"1.0",turn_type:"recommendation",user_text:"[MOCK] 难过",emotion_label:"难过",face_state:"gentle",bartender_line:"没关系的。",emotion_blend:[{emotion:"难过",weight:1}],complex_emotion:"",need_summary:"",drink_name:"",recipe_modules:[],flavor_profile:"",color_profile:"",action_sequence:"",feedback_prompt:"" },
  "4": { schema_version:"1.0",turn_type:"bar_chat",user_text:"[MOCK] 疲惫",emotion_label:"疲惫",face_state:"gentle",bartender_line:"哈啊……我想静静。",emotion_blend:[{emotion:"疲惫",weight:1}],complex_emotion:"",need_summary:"",drink_name:"",recipe_modules:[],flavor_profile:"",color_profile:"",action_sequence:"",feedback_prompt:"" },
  "5": { schema_version:"1.0",turn_type:"bar_chat",user_text:"[MOCK] 焦虑",emotion_label:"焦虑",face_state:"focused",bartender_line:"深呼吸，我在这里。",emotion_blend:[{emotion:"焦虑",weight:1}],complex_emotion:"",need_summary:"",drink_name:"",recipe_modules:[],flavor_profile:"",color_profile:"",action_sequence:"",feedback_prompt:"" },
  "6": { schema_version:"1.0",turn_type:"bar_chat",user_text:"[MOCK] 犹豫",emotion_label:"犹豫",face_state:"thinking",bartender_line:"不着急，慢慢想。",emotion_blend:[{emotion:"犹豫",weight:1}],complex_emotion:"",need_summary:"",drink_name:"",recipe_modules:[],flavor_profile:"",color_profile:"",action_sequence:"",feedback_prompt:"" }
};

document.addEventListener("keydown", function(e) {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  var key = e.key;
  if (MOCK_PAYLOADS[key]) {
    e.preventDefault();
    var payload = MOCK_PAYLOADS[key];
    window.updateTenderState(payload);
    setReply(payload.bartender_line);
    setStatus("● MOCK");
  }
});

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
