<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EmoTender · 情绪酒保</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; gap: 24px;
    font-family: 'Courier New','PingFang SC',monospace;
    background: #000000; overflow-x: hidden;
  }

  /* ===== OLED 屏幕容器 ===== */
  #crt-screen {
    position:relative; width:400px; height:400px;
    background-color:#000000 !important;
    overflow:hidden; border-radius:16px;
    transition: box-shadow 0.4s ease;
  }
  #crt-screen[data-emotion="清醒"] { --neon-color:#8cc8e0; }
  #crt-screen[data-emotion="兴奋"] { --neon-color:#90d8b0; }
  #crt-screen[data-emotion="难过"] { --neon-color:#c8bbe0; }
  #crt-screen[data-emotion="疲惫"] { --neon-color:#f2da90; }
  #crt-screen[data-emotion="焦虑"] { --neon-color:#e8a8a0; }
  #crt-screen[data-emotion="犹豫"] { --neon-color:#a8d8a0; }

  /* ===== OLED 像素网格叠加层 ===== */
  #crt-screen::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 15;
    background-image: radial-gradient(circle, rgba(0,0,0,0.38) 0.35px, transparent 0.35px);
    background-size: 2.5px 2.5px;
    border-radius: 16px;
  }

  /* ===== 光晕闪现动画 ===== */
  /* 清醒 · cyan 光晕 */
  @keyframes halo-清醒 {
    0%   { box-shadow: inset 0 0 240px 120px rgba(140,200,224,0.8),
                       inset 0 0 560px 280px rgba(140,200,224,0.5),
                       inset 0 0 880px 480px rgba(140,200,224,0.2);
           outline: 32px solid rgba(140,200,224,0.7); outline-offset: -16px; }
    40%  { box-shadow: inset 0 0 160px 80px rgba(140,200,224,0.55),
                       inset 0 0 400px 200px rgba(140,200,224,0.35),
                       inset 0 0 640px 320px rgba(140,200,224,0.12);
           outline: 20px solid rgba(140,200,224,0.4); outline-offset: -16px; }
    70%  { box-shadow: inset 0 0 80px 32px rgba(140,200,224,0.25),
                       inset 0 0 200px 100px rgba(140,200,224,0.12),
                       inset 0 0 320px 160px rgba(140,200,224,0.04);
           outline: 8px solid rgba(140,200,224,0.12); outline-offset: -16px; }
    100% { box-shadow: inset 0 0 0px 0px transparent,
                       inset 0 0 0px 0px transparent,
                       inset 0 0 0px 0px transparent;
           outline: 0px solid transparent; outline-offset: -16px; }
  }
  #crt-screen.halo-清醒 {
    animation: halo-清醒 3s ease-out forwards;
    transition: box-shadow 0s, outline 0s !important;
  }
  /* 兴奋 · green 光晕 */
  @keyframes halo-兴奋 {
    0%   { box-shadow: inset 0 0 240px 120px rgba(144,216,176,0.8),
                       inset 0 0 560px 280px rgba(144,216,176,0.5),
                       inset 0 0 880px 480px rgba(144,216,176,0.2);
           outline: 32px solid rgba(144,216,176,0.7); outline-offset: -16px; }
    40%  { box-shadow: inset 0 0 160px 80px rgba(144,216,176,0.55),
                       inset 0 0 400px 200px rgba(144,216,176,0.35),
                       inset 0 0 640px 320px rgba(144,216,176,0.12);
           outline: 20px solid rgba(144,216,176,0.4); outline-offset: -16px; }
    70%  { box-shadow: inset 0 0 80px 32px rgba(144,216,176,0.25),
                       inset 0 0 200px 100px rgba(144,216,176,0.12),
                       inset 0 0 320px 160px rgba(144,216,176,0.04);
           outline: 8px solid rgba(144,216,176,0.12); outline-offset: -16px; }
    100% { box-shadow: inset 0 0 0px 0px transparent,
                       inset 0 0 0px 0px transparent,
                       inset 0 0 0px 0px transparent;
           outline: 0px solid transparent; outline-offset: -16px; }
  }
  #crt-screen.halo-兴奋 {
    animation: halo-兴奋 3s ease-out forwards;
    transition: box-shadow 0s, outline 0s !important;
  }
  /* 难过 · purple 光晕 */
  @keyframes halo-难过 {
    0%   { box-shadow: inset 0 0 240px 120px rgba(200,187,224,0.8),
                       inset 0 0 560px 280px rgba(200,187,224,0.5),
                       inset 0 0 880px 480px rgba(200,187,224,0.2);
           outline: 32px solid rgba(200,187,224,0.7); outline-offset: -16px; }
    40%  { box-shadow: inset 0 0 160px 80px rgba(200,187,224,0.55),
                       inset 0 0 400px 200px rgba(200,187,224,0.35),
                       inset 0 0 640px 320px rgba(200,187,224,0.12);
           outline: 20px solid rgba(200,187,224,0.4); outline-offset: -16px; }
    70%  { box-shadow: inset 0 0 80px 32px rgba(200,187,224,0.25),
                       inset 0 0 200px 100px rgba(200,187,224,0.12),
                       inset 0 0 320px 160px rgba(200,187,224,0.04);
           outline: 8px solid rgba(200,187,224,0.12); outline-offset: -16px; }
    100% { box-shadow: inset 0 0 0px 0px transparent,
                       inset 0 0 0px 0px transparent,
                       inset 0 0 0px 0px transparent;
           outline: 0px solid transparent; outline-offset: -16px; }
  }
  #crt-screen.halo-难过 {
    animation: halo-难过 3s ease-out forwards;
    transition: box-shadow 0s, outline 0s !important;
  }
  /* 疲惫 · gold 光晕 */
  @keyframes halo-疲惫 {
    0%   { box-shadow: inset 0 0 240px 120px rgba(242,218,144,0.8),
                       inset 0 0 560px 280px rgba(242,218,144,0.5),
                       inset 0 0 880px 480px rgba(242,218,144,0.2);
           outline: 32px solid rgba(242,218,144,0.7); outline-offset: -16px; }
    40%  { box-shadow: inset 0 0 160px 80px rgba(242,218,144,0.55),
                       inset 0 0 400px 200px rgba(242,218,144,0.35),
                       inset 0 0 640px 320px rgba(242,218,144,0.12);
           outline: 20px solid rgba(242,218,144,0.4); outline-offset: -16px; }
    70%  { box-shadow: inset 0 0 80px 32px rgba(242,218,144,0.25),
                       inset 0 0 200px 100px rgba(242,218,144,0.12),
                       inset 0 0 320px 160px rgba(242,218,144,0.04);
           outline: 8px solid rgba(242,218,144,0.12); outline-offset: -16px; }
    100% { box-shadow: inset 0 0 0px 0px transparent,
                       inset 0 0 0px 0px transparent,
                       inset 0 0 0px 0px transparent;
           outline: 0px solid transparent; outline-offset: -16px; }
  }
  #crt-screen.halo-疲惫 {
    animation: halo-疲惫 3s ease-out forwards;
    transition: box-shadow 0s, outline 0s !important;
  }
  /* 焦虑 · coral 光晕 */
  @keyframes halo-焦虑 {
    0%   { box-shadow: inset 0 0 240px 120px rgba(232,168,160,0.8),
                       inset 0 0 560px 280px rgba(232,168,160,0.5),
                       inset 0 0 880px 480px rgba(232,168,160,0.2);
           outline: 32px solid rgba(232,168,160,0.7); outline-offset: -16px; }
    40%  { box-shadow: inset 0 0 160px 80px rgba(232,168,160,0.55),
                       inset 0 0 400px 200px rgba(232,168,160,0.35),
                       inset 0 0 640px 320px rgba(232,168,160,0.12);
           outline: 20px solid rgba(232,168,160,0.4); outline-offset: -16px; }
    70%  { box-shadow: inset 0 0 80px 32px rgba(232,168,160,0.25),
                       inset 0 0 200px 100px rgba(232,168,160,0.12),
                       inset 0 0 320px 160px rgba(232,168,160,0.04);
           outline: 8px solid rgba(232,168,160,0.12); outline-offset: -16px; }
    100% { box-shadow: inset 0 0 0px 0px transparent,
                       inset 0 0 0px 0px transparent,
                       inset 0 0 0px 0px transparent;
           outline: 0px solid transparent; outline-offset: -16px; }
  }
  #crt-screen.halo-焦虑 {
    animation: halo-焦虑 3s ease-out forwards;
    transition: box-shadow 0s, outline 0s !important;
  }
  /* 犹豫 · lime 光晕 */
  @keyframes halo-犹豫 {
    0%   { box-shadow: inset 0 0 240px 120px rgba(168,216,160,0.8),
                       inset 0 0 560px 280px rgba(168,216,160,0.5),
                       inset 0 0 880px 480px rgba(168,216,160,0.2);
           outline: 32px solid rgba(168,216,160,0.7); outline-offset: -16px; }
    40%  { box-shadow: inset 0 0 160px 80px rgba(168,216,160,0.55),
                       inset 0 0 400px 200px rgba(168,216,160,0.35),
                       inset 0 0 640px 320px rgba(168,216,160,0.12);
           outline: 20px solid rgba(168,216,160,0.4); outline-offset: -16px; }
    70%  { box-shadow: inset 0 0 80px 32px rgba(168,216,160,0.25),
                       inset 0 0 200px 100px rgba(168,216,160,0.12),
                       inset 0 0 320px 160px rgba(168,216,160,0.04);
           outline: 8px solid rgba(168,216,160,0.12); outline-offset: -16px; }
    100% { box-shadow: inset 0 0 0px 0px transparent,
                       inset 0 0 0px 0px transparent,
                       inset 0 0 0px 0px transparent;
           outline: 0px solid transparent; outline-offset: -16px; }
  }
  #crt-screen.halo-犹豫 {
    animation: halo-犹豫 3s ease-out forwards;
    transition: box-shadow 0s, outline 0s !important;
  }

  /* ===== 录音脉冲 (与光晕互不冲突) ===== */
  @keyframes recording-pulse {
    0%,100%{box-shadow:0 0 0 0px transparent}
    50%{box-shadow:0 0 32px 4px var(--neon-color,#8cc8e0)}
  }
  #crt-screen.recording-active {
    animation:recording-pulse 1.2s ease-in-out infinite;
    box-shadow:0 0 20px 2px var(--neon-color,#8cc8e0);
  }

  /* ===== 霓虹线条样式 ===== */
  .neon-eye {
    fill:none; stroke:var(--neon-color) !important;
    stroke-width:16; stroke-linecap:round; stroke-linejoin:round;
  }
  .neon-mouth {
    fill:none; stroke:var(--neon-color) !important;
    stroke-width:10; stroke-linecap:round; stroke-linejoin:round;
  }
  .neon-ring {
    fill:none; stroke:var(--neon-color) !important;
    stroke-width:8; stroke-linecap:round; stroke-linejoin:round;
  }

  /* ===== 表情标签 ===== */
  #face-state-label {
    position:absolute; bottom:-28px; left:50%; transform:translateX(-50%);
    z-index:20; font-family:'Courier New',monospace; font-size:10px;
    letter-spacing:0.2em; color:var(--neon-color); opacity:0.38;
    text-transform:uppercase; transition:color 0.3s ease; pointer-events:none;
  }

  /* ===== 表情组显隐 ===== */
  .pixel-face-group {
    opacity:0 !important; visibility:hidden !important;
    transform:scale(0.88); transform-origin:200px 200px;
    transition:opacity 0.55s ease, transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
  }
  #crt-screen[data-emotion="清醒"] #group-qx,
  #crt-screen:not([data-emotion]) #group-qx,
  #crt-screen[data-emotion=""] #group-qx,
  #crt-screen[data-emotion="兴奋"] #group-xf,
  #crt-screen[data-emotion="难过"] #group-ng,
  #crt-screen[data-emotion="疲惫"] #group-pb,
  #crt-screen[data-emotion="焦虑"] #group-jl,
  #crt-screen[data-emotion="犹豫"] #group-yy {
    opacity:1 !important; visibility:visible !important; transform:scale(1) !important;
  }

  /* ================================================================
     表情动画 — 按提示词重新设计
     ================================================================ */

  /* ---- 1. 清醒：嘴巴横向缓慢拉伸循环，眼睛保持静止 ---- */
  @keyframes qx-mouth-stretch {
    0%,100% { transform: scaleX(1); }
    50%     { transform: scaleX(1.45); }
  }
  #group-qx .neon-mouth {
    animation: qx-mouth-stretch 2.2s ease-in-out infinite;
    transform-origin: 200px 240px;
  }
  /* 眼睛完全静止，无动画 */

  /* ---- 2. 兴奋：大笑夸张弧度 + 交替眨眼 + 嘴随眨眼微颤 ---- */
  @keyframes xf-blink-L {
    0%,100% { transform: scaleY(1); }
    18%,24% { transform: scaleY(0.06); }
    50%,56% { transform: scaleY(1); }
    68%,74% { transform: scaleY(0.06); }
  }
  @keyframes xf-blink-R {
    0%,20%  { transform: scaleY(1); }
    26%,32% { transform: scaleY(0.06); }
    58%,64% { transform: scaleY(1); }
    76%,82% { transform: scaleY(0.06); }
    100%    { transform: scaleY(1); }
  }
  .xf-eye-L {
    animation: xf-blink-L 1.5s ease-in-out infinite;
    transform-origin: 112px 140px;
  }
  .xf-eye-R {
    animation: xf-blink-R 1.5s ease-in-out infinite;
    transform-origin: 288px 140px;
  }
  /* 笑嘴随眨眼节奏微颤 */
  @keyframes xf-mouth-quiver {
    0%,16%  { transform: scale(1); }
    20%,28% { transform: scale(1.04, 0.97); }
    40%,48% { transform: scale(1); }
    52%,60% { transform: scale(1.03, 0.97); }
    64%,72% { transform: scale(1); }
    76%,84% { transform: scale(1.04, 0.97); }
    88%,100%{ transform: scale(1); }
  }
  .xf-mouth {
    animation: xf-mouth-quiver 1.5s ease-in-out infinite;
    transform-origin: 200px 260px;
  }

  /* ---- 3. 难过：眼睛不变，嘴巴大幅扩张收缩循环 ---- */
  @keyframes ng-mouth-expand {
    0%,100% { transform: scale(1); }
    40%,60% { transform: scale(1.4, 1.35); }
  }
  .ng-mouth {
    animation: ng-mouth-expand 1.6s ease-in-out infinite;
    transform-origin: 200px 248px;
  }
  /* X 眼保持静止，去掉抖动 */

  /* ---- 4. 疲惫：空心圆眼 + 缓速间歇眨眼，嘴巴静止 ---- */
  @keyframes pb-slow-blink {
    0%,76%  { transform: scaleY(1); }
    84%,92% { transform: scaleY(0.08); }
    100%    { transform: scaleY(1); }
  }
  .pb-eye-L {
    animation: pb-slow-blink 3.8s ease-in-out infinite;
    transform-origin: 113px 148px;
  }
  .pb-eye-R {
    animation: pb-slow-blink 3.8s ease-in-out infinite;
    transform-origin: 287px 148px;
  }
  /* 嘴巴完全静止 */

  /* ---- 5. 焦虑：夸张眼型 + 同步放大嘴部，静态画面 ---- */
  /* 无循环动画 — 静态夸张表情 */

  /* ---- 6. 犹豫：保持原有眼型 + 缓速眨眼，大幅夸张嘴型 ---- */
  @keyframes yy-gentle-blink {
    0%,82%  { transform: scaleY(1); }
    88%,94% { transform: scaleY(0.1); }
    100%    { transform: scaleY(1); }
  }
  .yy-eye-L {
    animation: yy-gentle-blink 4.5s ease-in-out infinite;
    transform-origin: 114px 150px;
  }
  .yy-eye-R {
    animation: yy-gentle-blink 4.5s ease-in-out infinite;
    transform-origin: 286px 150px;
  }


  /* ===== 装饰动画 ===== */

  /* 爱心飘落 (兴奋) */
  @keyframes hf {
    0%{transform:translate(0,0) rotate(0deg); opacity:0}
    2%{opacity:0.9}
    15%{transform:translate(0,400px) rotate(10deg); opacity:0}
    16%,100%{transform:translate(0,0) rotate(0deg); opacity:0}
  }
  .h1 { animation:hf 20s ease-in infinite 0s backwards; }
  .h2 { animation:hf 20s ease-in infinite 3s backwards; }
  .h3 { animation:hf 20s ease-in infinite 6s backwards; }
  .h4 { animation:hf 20s ease-in infinite 9s backwards; }
  .h5 { animation:hf 20s ease-in infinite 12s backwards; }
  .h6 { animation:hf 20s ease-in infinite 15s backwards; }

  /* 泪滴滑落 (难过) */
  @keyframes tear-fall { 0%{transform:translate(0,0) scale(1); opacity:0.8} 60%{transform:translate(0,70px) scale(0.8); opacity:0.4} 100%{transform:translate(0,130px) scale(0.4); opacity:0} }
  .t1 { animation:tear-fall 2.5s ease-in infinite; }
  .t2 { animation:tear-fall 2.5s ease-in infinite 0.6s; }

  /* ===== 控制栏 ===== */
  #control-bar { display:flex; align-items:center; gap:14px; }
  #control-bar button {
    font-family:'Courier New',monospace; font-size:12px;
    padding:7px 16px; border:1px solid; cursor:pointer;
    background:transparent; transition:all 0.2s ease;
    letter-spacing:0.1em; text-transform:uppercase;
  }
  #btnStart { color:#8cc8e0; border-color:rgba(140,200,224,0.3); }
  #btnStart:hover { background:rgba(140,200,224,0.1); border-color:rgba(140,200,224,0.55); }
  #btnStop  { color:#e8a8a0; border-color:rgba(232,168,160,0.2); }
  #btnStop:hover  { background:rgba(232,168,160,0.1); border-color:rgba(232,168,160,0.4); }
  #btnReset { color:rgba(180,180,190,0.45); border-color:rgba(180,180,190,0.12); }
  #btnReset:hover { color:rgba(200,200,210,0.75); border-color:rgba(200,200,210,0.28); }
  #status-line {
    font-family:'Courier New',monospace; font-size:10px;
    color:rgba(140,200,224,0.32); letter-spacing:0.14em;
    min-height:1.1em; text-align:center;
  }
  #reply-area {
    max-width:420px; text-align:center;
    font-family:'Courier New',monospace; font-size:13px;
    color:rgba(200,210,220,0.6); line-height:1.7;
    min-height:2.4em; transition:opacity 0.4s ease;
  }

  @media (max-width:500px) {
    #crt-screen { width:300px !important; height:300px !important; }
    #reply-area { font-size:11px; max-width:300px; }
    #control-bar button { font-size:10px; padding:5px 12px; }
  }
</style>
</head>
<body>

<div id="crt-screen" data-emotion="清醒" style="position:relative;width:400px;height:400px;background-color:#000000!important;overflow:hidden;">
  <svg viewBox="0 0 400 400" style="width:100%;height:100%;">
    <defs>
      <!-- 柔和霓虹辉光 -->
      <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="core"/>
        <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="ambient"/>
        <feMerge>
          <feMergeNode in="ambient"/>
          <feMergeNode in="core"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

      <!-- 轻微数字噪点 (OLED 纹理) -->
      <filter id="digital-noise" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" result="noise"/>
        <feComponentTransfer in="noise" result="alphaNoise">
          <feFuncA type="linear" slope="0.025"/>
        </feComponentTransfer>
        <feBlend mode="screen" in="alphaNoise" in2="SourceGraphic"/>
      </filter>
    </defs>

    <rect x="0" y="0" width="400" height="400" fill="#000000"/>

    <!-- ================================================================
         表情组 — 按提示词重新设计
         比例: 眼跨~260px(65%), 眼Y=148(37%), 嘴Y≈240(60%)
         ================================================================ -->

    <!-- 1. 清醒·浅青蓝 — 嘴横向拉伸循环，眼静止 -->
    <g id="group-qx" class="pixel-face-group" filter="url(#soft-glow)">
      <line class="neon-eye" x1="58" y1="148" x2="170" y2="148"/>
      <line class="neon-eye" x1="230" y1="148" x2="342" y2="148"/>
      <line class="neon-mouth" x1="183" y1="240" x2="217" y2="240"/>
    </g>

    <!-- 2. 兴奋·薄荷绿 — 大笑眼弧 + 大张嘴 + 交替眨眼 + 嘴随眨眼微颤 + 飘落爱心 -->
    <g id="group-xf" class="pixel-face-group" filter="url(#soft-glow)">
      <!-- 夸张大笑眼弧 -->
      <path class="neon-eye xf-eye-L" d="M58,152 Q112,108 168,148"/>
      <path class="neon-eye xf-eye-R" d="M232,148 Q288,108 342,152"/>
      <!-- 大笑嘴 -->
      <path class="neon-mouth xf-mouth" d="M135,245 Q200,300 265,245"/>
      <!-- 飘落爱心 -->
      <g opacity="0.35">
        <path class="h1" style="opacity:0" d="M120,10 C120,2 114,-2 110,2 C107,5 107,8 109,12 L120,24 L131,12 C133,8 133,5 130,2 C126,-2 120,2 120,10 Z" fill="#f5a0b8"/>
        <path class="h2" style="opacity:0" d="M300,30 C300,22 294,18 290,22 C287,25 287,28 289,32 L300,44 L311,32 C313,28 313,25 310,22 C306,18 300,22 300,30 Z" fill="#f5a0b8"/>
        <path class="h3" style="opacity:0" d="M200,50 C200,42 194,38 190,42 C187,45 187,48 189,52 L200,64 L211,52 C213,48 213,45 210,42 C206,38 200,42 200,50 Z" fill="#f5a0b8"/>
        <path class="h4" style="opacity:0" d="M80,20 C80,12 74,8 70,12 C67,15 67,18 69,22 L80,34 L91,22 C93,18 93,15 90,12 C86,8 80,12 80,20 Z" fill="#f5a0b8"/>
        <path class="h5" style="opacity:0" d="M340,55 C340,47 334,43 330,47 C327,50 327,53 329,57 L340,69 L351,57 C353,53 353,50 350,47 C346,43 340,47 340,55 Z" fill="#f5a0b8"/>
        <path class="h6" style="opacity:0" d="M160,70 C160,62 154,58 150,62 C147,65 147,68 149,72 L160,84 L171,72 C173,68 173,65 170,62 C166,58 160,62 160,70 Z" fill="#f5a0b8"/>
      </g>
    </g>

    <!-- 3. 难过·淡薰衣草紫 — X眼静止 + 嘴扩张收缩循环 + 泪滴 -->
    <g id="group-ng" class="pixel-face-group" filter="url(#soft-glow)">
      <!-- X眼静态 -->
      <g>
        <line class="neon-eye" x1="76" y1="120" x2="154" y2="178"/>
        <line class="neon-eye" x1="154" y1="120" x2="76" y2="178"/>
      </g>
      <g>
        <line class="neon-eye" x1="246" y1="120" x2="324" y2="178"/>
        <line class="neon-eye" x1="324" y1="120" x2="246" y2="178"/>
      </g>
      <!-- 嘴扩张收缩 -->
      <g class="ng-mouth">
        <path class="neon-mouth" d="M185,240 Q200,260 215,240"/>
      </g>
      <!-- 泪滴滑落 -->
      <g opacity="0.5">
        <ellipse class="t1" cx="115" cy="180" rx="5" ry="9" fill="#88b8e8" filter="url(#soft-glow)"/>
        <ellipse class="t2" cx="285" cy="180" rx="5" ry="9" fill="#88b8e8" filter="url(#soft-glow)"/>
      </g>
    </g>

    <!-- 4. 疲惫·奶黄 — 空心圆眼 + 缓速眨眼，嘴静止 -->
    <g id="group-pb" class="pixel-face-group" filter="url(#soft-glow)">
      <g class="pb-eye-L">
        <circle class="neon-ring" cx="113" cy="148" r="38"/>
      </g>
      <g class="pb-eye-R">
        <circle class="neon-ring" cx="287" cy="148" r="38"/>
      </g>
      <path class="neon-mouth" d="M190,240 Q200,234 210,240"/>
    </g>

    <!-- 5. 焦虑·浅砖红 — 夸张V型眼 + 同步放大锯齿嘴，静态画面 -->
    <g id="group-jl" class="pixel-face-group" filter="url(#soft-glow)">
      <!-- 夸张 V 型眼 -->
      <path class="neon-eye" d="M64,112 Q114,170 158,112"/>
      <path class="neon-eye" d="M242,112 Q286,170 336,112"/>
      <!-- 放大锯齿嘴 -->
      <path class="neon-mouth" d="M168,238 Q182,222 196,238 Q210,254 224,238 Q238,222 232,238"/>
    </g>

    <!-- 6. 犹豫·嫩浅绿 — 温和弧线眼(保持原风格) + 大幅夸张嘴，静态画面 -->
    <g id="group-yy" class="pixel-face-group" filter="url(#soft-glow)">
      <!-- 温和弧线眼 + 缓眨 -->
      <path class="neon-eye yy-eye-L" d="M68,150 Q114,128 160,150"/>
      <path class="neon-eye yy-eye-R" d="M240,150 Q286,128 332,150"/>
      <!-- 大幅夸张宽嘴 -->
      <path class="neon-mouth" d="M178,238 Q200,228 222,238"/>
    </g>

    <!-- 数字噪点叠加层 (OLED 纹理) -->
    <rect x="0" y="0" width="400" height="400" fill="none"
          filter="url(#digital-noise)" style="pointer-events:none; opacity:0.6;"/>
  </svg>
  <div id="face-state-label">清醒</div>
</div>

<div id="reply-area"></div>

<div id="control-bar">
  <button id="btnStart" onclick="startRecording()">Start</button>
  <button id="btnStop" onclick="stopRecording()">Stop</button>
  <span id="status-line"></span>
  <button id="btnReset" onclick="resetSystem()">Reset</button>
</div>

<script>
let s="standby";
function F(t){s=t;var e=document.getElementById("face-state-label");if(e)e.textContent=(t||'').toUpperCase()}
function U(t){var e=document.getElementById("status-line");if(e)e.textContent=t||''}
function R(t){var e=document.getElementById("reply-area");if(e){e.style.opacity='0';setTimeout(function(){e.textContent=t||'';e.style.opacity='1'},180)}}

/* ---- 光晕闪现逻辑 ---- */
function triggerHalo(c, emotion) {
  // 清除所有光晕 class
  var haloClasses = ['halo-清醒','halo-兴奋','halo-难过','halo-疲惫','halo-焦虑','halo-犹豫'];
  haloClasses.forEach(function(cls){ c.classList.remove(cls); });
  // 触发回流以重置动画
  void c.offsetWidth;
  // 每种情绪对应独特色光晕
  if (emotion) {
    c.classList.add('halo-' + emotion);
  }
  // 动画结束后自动移除 (动画时长 3s)
  setTimeout(function() {
    haloClasses.forEach(function(cls){ c.classList.remove(cls); });
  }, 3100);
}

window.updateTenderState=function(d){
  var c=document.getElementById('crt-screen');if(!c)return;
  var l=(d.emotion_label||'').trim(),t=(d.face_state||'').trim(),e="清醒";
  if(l==="疲惫"||(t==="gentle"&&l!=="难过"))e="疲惫";
  else if(l==="难过")e="难过";
  else if(l==="焦虑"||(t==="focused"&&l!=="清醒"))e="焦虑";
  else if(l==="清醒")e="清醒";
  else if(l==="兴奋"||t==="happy")e="兴奋";
  else if(l==="犹豫"||t==="thinking")e="犹豫";

  var prev = c.getAttribute('data-emotion');
  c.setAttribute('data-emotion',e);
  if(d.face_state)F(d.face_state);

  // 情绪切换时触发一次光晕
  if (prev !== e) {
    triggerHalo(c, e);
  }
};

const B="";
async function C(p){var r=await fetch(B+p,{method:"POST"});var d=await r.json();if(!r.ok)throw d;return d}
async function startRecording(){
  try{U("● REC");var c=document.getElementById("crt-screen");if(c)c.classList.add("recording-active");await C("/api/voice/start")}
  catch(e){U("IDLE");var c=document.getElementById("crt-screen");if(c)c.classList.remove("recording-active");R("录音启动失败: "+(e.detail||e.message||"?"))}}
async function stopRecording(){
  try{U("● PROC");var c=document.getElementById("crt-screen");if(c)c.classList.remove("recording-active");
    var d=await C("/api/voice/stop");if(d.control_json)window.updateTenderState(d.control_json);if(d.robot_reply_text)R(d.robot_reply_text);U(d.turn_type==="bar_chat"?"IDLE":"● OK")}
  catch(e){U("IDLE");R("分析失败: "+(e.detail||e.message||"?"))}}
async function resetSystem(){try{await C("/api/reset");I();R("")}catch(e){R("重置失败: "+(e.detail||e.message||"?"))}}
function I(){
  var c=document.getElementById("crt-screen");if(c){
    var prev = c.getAttribute('data-emotion');
    c.setAttribute("data-emotion","清醒");
    F("清醒");U("IDLE");
    // 重置时也触发光晕 (如果前一个情绪不同)
    if (prev !== '清醒') {
      triggerHalo(c, '清醒');
    }
  }
}

var M={1:{emotion_label:"清醒",face_state:"focused",bartender_line:"…嗯？我在。",emotion_blend:[{emotion:"清醒",weight:1}]},2:{emotion_label:"兴奋",face_state:"happy",bartender_line:"嘿嘿，今天状态超好！",emotion_blend:[{emotion:"兴奋",weight:1}]},3:{emotion_label:"难过",face_state:"gentle",bartender_line:"没关系的……慢慢来。",emotion_blend:[{emotion:"难过",weight:1}]},4:{emotion_label:"疲惫",face_state:"gentle",bartender_line:"呼……能量有点低。",emotion_blend:[{emotion:"疲惫",weight:1}]},5:{emotion_label:"焦虑",face_state:"focused",bartender_line:"深呼吸……我在这里陪你。",emotion_blend:[{emotion:"焦虑",weight:1}]},6:{emotion_label:"犹豫",face_state:"thinking",bartender_line:"唔…不着急，慢慢想~",emotion_blend:[{emotion:"犹豫",weight:1}]}};
document.addEventListener("keydown",function(e){if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")return;var k=e.key;if(M[k]){e.preventDefault();var p=M[k];window.updateTenderState(p);R(p.bartender_line||"");U("● MOCK")}});
document.addEventListener("DOMContentLoaded",function(){
  I();
  // 首次加载也触发光晕
  var c=document.getElementById('crt-screen');
  if(c) { triggerHalo(c, '清醒'); }
});
</script>
</body>
</html>
